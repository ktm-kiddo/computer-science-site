<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ms. Wong Cat Photos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Manrope:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1b2d2a;
        --paper: #fff8ea;
        --warm: #f5b349;
        --cool: #2a8f86;
        --soft: #f3dfbc;
        --panel: rgba(255, 248, 234, 0.86);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 14% 18%,
            rgba(245, 179, 73, 0.28),
            transparent 30%
          ),
          radial-gradient(
            circle at 82% 8%,
            rgba(42, 143, 134, 0.25),
            transparent 34%
          ),
          linear-gradient(160deg, #fff8ea 0%, #f7e9cd 44%, #f4e3bf 100%);
        min-height: 100vh;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(27, 45, 42, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(27, 45, 42, 0.06) 1px, transparent 1px);
        background-size: 22px 22px;
        mask-image: radial-gradient(
          circle at center,
          black 35%,
          transparent 90%
        );
      }

      .wrap {
        width: min(1100px, 92vw);
        margin: 0 auto;
        padding: 3rem 0 4rem;
      }

      header {
        background: var(--panel);
        border: 2px solid rgba(27, 45, 42, 0.14);
        border-radius: 24px;
        padding: 1.4rem 1.6rem;
        box-shadow: 0 10px 28px rgba(27, 45, 42, 0.12);
        backdrop-filter: blur(3px);
      }

      .eyebrow {
        margin: 0;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cool);
        font-size: 0.78rem;
      }

      h1 {
        margin: 0.45rem 0 0.5rem;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(2rem, 3.2vw, 3rem);
        line-height: 1.1;
      }

      .sub {
        margin: 0;
        font-size: 1rem;
      }

      .gallery {
        margin-top: 1.6rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.1rem;
      }

      .card {
        background: var(--panel);
        border: 2px solid rgba(27, 45, 42, 0.1);
        border-radius: 18px;
        padding: 0.65rem;
        box-shadow: 0 8px 20px rgba(27, 45, 42, 0.12);
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px) scale(0.98);
        animation: popIn 0.6s ease forwards;
      }

      .photo-button {
        display: block;
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: zoom-in;
      }

      .photo {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 12px;
        border: 2px solid rgba(27, 45, 42, 0.12);
        background: var(--soft);
        transition: transform 0.24s ease;
        transform-origin: center;
      }

      .card:hover .photo,
      .photo-button:focus-visible .photo {
        transform: scale(1.07);
      }

      .photo-button:focus-visible {
        outline: 3px solid rgba(42, 143, 134, 0.45);
        outline-offset: 3px;
        border-radius: 14px;
      }

      .disclaimer {
        margin: 0.9rem 0 0;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: rgba(27, 45, 42, 0.72);
      }

      .actions {
        margin-top: 1.4rem;
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
      }

      .button {
        text-decoration: none;
        display: inline-block;
        padding: 0.68rem 0.95rem;
        border-radius: 999px;
        border: 2px solid rgba(27, 45, 42, 0.2);
        color: var(--ink);
        background: var(--panel);
        font-weight: 700;
        transition:
          transform 0.15s ease,
          background 0.15s ease;
      }

      .button:hover {
        transform: translateY(-2px);
        background: #fff2d8;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(16, 18, 20, 0.82);
        z-index: 1000;
      }

      .lightbox.open {
        display: flex;
      }

      .lightbox img {
        max-width: min(1100px, 96vw);
        max-height: 84vh;
        border-radius: 16px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 14px 38px rgba(0, 0, 0, 0.35);
      }

      .lightbox-close {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        color: #1b2d2a;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
      }

      @keyframes popIn {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 640px) {
        .wrap {
          padding-top: 1.6rem;
        }

        header {
          padding: 1.05rem;
        }

        .gallery {
          gap: 0.8rem;
        }
      }
    </style>
  </head>

    </main>

    <div
      class="lightbox"
      id="lightbox"
      role="dialog"
      aria-modal="true"
      aria-label="Expanded cat photo"
    >
      <button
        class="lightbox-close"
        type="button"
        id="lightboxClose"
        aria-label="Close photo viewer"
      >
        x
      </button>
      <img id="lightboxImage" src="" alt="Expanded cat photo" />
    </div>

    <script>
      const cards = document.querySelectorAll(".card");
      cards.forEach((card, index) => {
        card.style.animationDelay = `${index * 0.05}s`;
      });

      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const lightboxClose = document.getElementById("lightboxClose");
      const photoButtons = document.querySelectorAll(".photo-button");

      function openLightbox(src, alt) {
        lightboxImage.src = src;
        lightboxImage.alt = alt;
        lightbox.classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.remove("open");
        lightboxImage.src = "";
        document.body.style.overflow = "";
      }

      photoButtons.forEach((button) => {
        button.addEventListener("click", () => {
          openLightbox(button.dataset.full, button.dataset.alt);
        });
      });

      lightboxClose.addEventListener("click", closeLightbox);

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && lightbox.classList.contains("open")) {
          closeLightbox();
        }
      });
    </script>
